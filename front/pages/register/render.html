<div class="auth-wrapper">
  <div class="register-container fade-in">

    <!-- HEADER -->
    <div class="register-header">
      <h1>Criar Conta</h1>
    </div>

    <!-- FORM -->
    <form id="register-form" class="register-form">
      <input type="text" id="name" placeholder="Seu nome" required />
      <input type="email" id="email" placeholder="Seu email" required />
      <input type="password" id="password" placeholder="Sua senha" required />
      <input type="password" id="confirm-password" placeholder="Confirme sua senha" required />
      <input type="tel" id="phone" placeholder="Número de telefone" required />
      <input type="text" id="cpf" placeholder="CPF (000.000.000-00)" maxlength="14" required />
      <input type="date" id="birthdate" required />

      <button type="submit">Cadastrar</button>

      <p>
        Já tem conta?
        <a href="#" id="go-to-login">Fazer login</a>
      </p>
    </form>

  </div>
</div>
