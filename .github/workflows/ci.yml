name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///./ci.db
      SECRET_KEY: ci-secret-key
      APP_INIT_DB_ON_STARTUP: "1"

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4.2.2

      - name: Configurar Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Instalar dependências do backend
        run: |
          python -m pip install --upgrade pip
          pip install -r configs/requirements.txt

      - name: Executar testes do backend
        run: python -m pytest back/app/tests -q

      - name: Adicionar ALGORITHM e ACCESS_TOKEN_EXPIRE_MINUTES ao env do CI
        run: echo "ALGORITHM=HS256" >> $GITHUB_ENV && echo "ACCESS_TOKEN_EXPIRE_MINUTES=60" >> $GITHUB_ENV

      - name: Subir API e validar healthcheck inicial
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 --app-dir back > uvicorn.log 2>&1 &
          for attempt in {1..20}; do
            if curl -fsS http://127.0.0.1:8000/ > response.json; then
              cat response.json
              echo "CI funcionando com sucesso!"
              exit 0
            fi
            sleep 1
          done

          echo "Falha ao iniciar a API durante o smoke test."
          cat uvicorn.log
          exit 1

  deploy:
    name: Deploy no Render
    runs-on: ubuntu-latest
    needs: backend-ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Acionar deploy via Deploy Hook
        run: |
          curl -fsSX POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "Deploy acionado com sucesso!"
