name: Release Pipeline

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-backend-release:
    name: Build Backend Release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip build

      - name: Build Python distribution
        run: python -m build

      - name: Generate backend checksums
        run: sha256sum dist/* > dist/SHA256SUMS.txt

      - name: Upload backend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-release-artifacts
          path: dist/*
          if-no-files-found: error

  build-frontend-release:
    name: Build Frontend Release
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      RELEASE_VERSION: ${{ github.event.release.tag_name || github.sha }}

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Package frontend build
        run: |
          tar -czf aigenda-frontend-${RELEASE_VERSION}.tar.gz .next public package.json package-lock.json next.config.ts
          sha256sum aigenda-frontend-${RELEASE_VERSION}.tar.gz > aigenda-frontend-${RELEASE_VERSION}.sha256

      - name: Upload frontend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-release-artifacts
          path: |
            frontend/aigenda-frontend-${{ github.event.release.tag_name || github.sha }}.tar.gz
            frontend/aigenda-frontend-${{ github.event.release.tag_name || github.sha }}.sha256
          if-no-files-found: error

  publish-release-assets:
    name: Publish Release Assets
    if: github.event_name == 'release'
    needs:
      - build-backend-release
      - build-frontend-release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Download backend artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-release-artifacts
          path: release-assets/backend

      - name: Download frontend artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-release-artifacts
          path: release-assets/frontend

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/backend/*
            release-assets/frontend/*