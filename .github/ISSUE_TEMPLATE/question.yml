name: Question
description: Ask a question about usage, architecture, or workflow.
title: "[Question]: "
labels:
  - question
body:
  - type: markdown
    attributes:
      value: |
        Use this form for project questions. Bug reports and feature requests should use their own templates.

  - type: textarea
    id: question
    attributes:
      label: Your question
      description: What do you need help with?
      placeholder: Write your question clearly and directly.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Add relevant context such as module, endpoint, or scenario.
      placeholder: Describe where this question appears in your workflow.
    validations:
      required: true

  - type: textarea
    id: research
    attributes:
      label: What you already checked
      description: Mention documentation, issues, or attempts you already reviewed.
      placeholder: |
        - Docs pages consulted:
        - Existing issues searched:
        - Attempts made:
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I confirmed this is not a bug report.
          required: true
        - label: I confirmed this is not a feature request.
          required: true
